<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100">
  <!-- Caduceus / Rod of Asclepius -->
  <line x1="38" y1="15" x2="38" y2="85" stroke="#1B3A6B" stroke-width="4" stroke-linecap="round"/>
  <!-- Snake body -->
  <path d="M38 28 Q55 22 52 35 Q49 48 38 44 Q27 40 30 53 Q33 66 50 62 Q60 58 58 72 Q56 82 38 82"
    stroke="#1BA5D9" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Snake head -->
  <ellipse cx="38" cy="18" rx="7" ry="5" fill="#1BA5D9" transform="rotate(-20,38,18)"/>
  <!-- Horizontal bars -->
  <line x1="28" y1="50" x2="48" y2="50" stroke="#1B3A6B" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="64" x2="46" y2="64" stroke="#1B3A6B" stroke-width="3" stroke-linecap="round"/>
  <!-- "elezaby" text -->
  <text x="72" y="55" font-family="Georgia, serif" font-size="34" font-style="italic" font-weight="700" fill="#1B3A6B">elezaby</text>
  <!-- "pharmacy" text -->
  <text x="120" y="78" font-family="Arial, sans-serif" font-size="16" fill="#1BA5D9" letter-spacing="1">pharmacy</text>
</svg>
